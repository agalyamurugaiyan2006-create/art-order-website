<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>
<body>
<video id="intro" autoplay muted playsinline>
    <source src="intro_video (1).mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("intro");
video.play().catch(() => {
    document.body.innerHTML += "<p style='color:white;position:absolute;'>Tap the screen to play the video.</p>";
});

video.onended = function() {
    window.location.href = "order.html";
};
</script>
</body>
</html>
