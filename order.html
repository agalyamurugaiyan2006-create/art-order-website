<!DOCTYPE html>
<html>
<head>
    <title>Place Your Order</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>
        (function () {
            emailjs.init({
                publicKey: "rcDk7JUtpNS3W0TIy",
            });
        })();

        function sendMail(event) {
            event.preventDefault();

            const params = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                message: document.getElementById("message").value,
            };

            emailjs.send("service_jbebjw7", "template_nwh7gkk", params)
                .then(function () {
                    alert("Order submitted successfully!");
                    document.getElementById("orderForm").reset();
                })
                .catch(function (error) {
                    alert("Failed to send order. Please try again.");
                    console.log(error);
                });
        }
    </script>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 50px;">

    <h1>Order Your Drawings & Projects</h1>

    <form id="orderForm" onsubmit="sendMail(event)">
        <input type="text" id="name" placeholder="Your Name" required style="width:300px;padding:10px;"><br><br>

        <input type="email" id="email" placeholder="Your Email" required style="width:300px;padding:10px;"><br><br>

        <textarea id="message" placeholder="Describe your order" required style="width:300px;height:150px;padding:10px;"></textarea><br><br>

        <button type="submit" style="padding:10px 20px;">Submit Order</button>
    </form>

</body>
</html>
