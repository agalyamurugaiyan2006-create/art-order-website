<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karthi Art Store</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
width:320px;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Our Products</h1>

<div class="gallery">

<div class="card">
<img src="drawing1.jpg">
<div class="card-content">
<h2>Custom Drawing</h2>
<p>Beautiful hand-made drawing.</p>
<p class="price">₹150</p>
<a class="btn" href="https://wa.me/918925117004?text=Hi%20I%20want%20to%20order%20Custom%20Drawing">Order on WhatsApp</a>
</div>
</div>

<div class="card">
<img src="drawing2.jpg">
<div class="card-content">
<h2>Portrait Art</h2>
<p>Premium portrait artwork.</p>
<p class="price">₹2500</p>
<a class="btn" href="https://wa.me/918925117004?text=Hi%20I%20want%20to%20order%20Portrait%20Art">Order on WhatsApp</a>
</div>
</div>

<div class="card">
<img src="project.jpg">
<div class="card-content">
<h2>Project Ideas</h2>
<p>Creative school and college projects.</p>
<p class="price">cost changes accodring to the work, ideas are free...</p>
<a class="btn" href="https://wa.me/918925117004?text=Hi%20I%20want%20Project%20Ideas">Order on WhatsApp</a>
</div>
</div>

</div>

</html>
