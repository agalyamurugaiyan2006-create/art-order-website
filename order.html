<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Drawings & Projects</title>
<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    text-align: center;
}
.card {
    max-width: 500px;
    margin: auto;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 20px;
}
button {
    padding: 12px 20px;
    font-size: 16px;
    border-radius: 8px;
}
</style>
</head>
<body>
<div class="card">
    <h1>Order Your Creative Work</h1>
    <p>✏️ Drawings</p>
    <p>🎨 Art Projects</p>
    <p>💡 Project Ideas</p>

    <h3>Place Your Order</h3>

    <form>
        <input type="text" placeholder="Your Name" style="width:90%;padding:10px;"><br><br>
        <textarea placeholder="Describe what you need" rows="5" style="width:90%;padding:10px;"></textarea><br><br>
        <button type="submit">Submit</button>
    </form>
</div>
</body>
</html>
